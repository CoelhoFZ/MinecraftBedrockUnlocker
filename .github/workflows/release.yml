name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to update
        required: true
      source_tag:
        description: Existing release tag to copy DLL assets from
        required: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y mono-mcs binutils-mingw-w64-x86-64

      - name: Validate PowerShell syntax
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          foreach ($file in @('install.ps1', 'unlocker.ps1')) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile((Resolve-Path $file), [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors.Count -gt 0) {
              $errors | Format-List | Out-String | Write-Error
              exit 1
            }
          }

      - name: Build launcher
        run: ./build/build.sh

      - name: Collect release assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name || github.event.inputs.tag }}
          SOURCE_TAG_INPUT: ${{ github.event.inputs.source_tag }}
        run: |
          set -euo pipefail
          mkdir -p release-assets
          cp install.ps1 unlocker.ps1 dist/MinecraftBedrockUnlocker.exe release-assets/

          source_tag="$SOURCE_TAG_INPUT"
          if [ -z "$source_tag" ]; then
            source_tag="$(gh release list --limit 20 | awk -v current="$RELEASE_TAG" '$1 != current { print $1; exit }')"
          fi
          if [ -z "$source_tag" ]; then
            echo "No previous release found to copy DLL assets from" >&2
            exit 1
          fi

          gh release download "$source_tag" \
            --pattern 'winmm.dll' \
            --pattern 'OnlineFix64.dll' \
            --pattern 'dlllist.txt' \
            --pattern 'OnlineFix.ini' \
            --dir release-assets

          cd release-assets
          sha256sum install.ps1 unlocker.ps1 MinecraftBedrockUnlocker.exe winmm.dll OnlineFix64.dll dlllist.txt OnlineFix.ini > SHA256SUMS.txt

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name || github.event.inputs.tag }}
        run: |
          gh release upload "$RELEASE_TAG" release-assets/* --clobber
