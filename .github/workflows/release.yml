name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  update-hashes:
    name: Regenerate SHA256SUMS + patch install.ps1
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute hashes for all .ps1 files
        id: hashes
        run: |
          # Regenerate SHA256SUMS.txt for every .ps1 in repo root
          # EXE line is preserved from the previous file (built separately)
          exe_line=$(grep '\.exe' SHA256SUMS.txt 2>/dev/null || true)
          {
            [ -n "$exe_line" ] && echo "$exe_line"
            sha256sum unlocker.ps1 install.ps1 e.ps1 i.ps1 bootstrap-v3.2.0.ps1 diagnose.ps1 2>/dev/null || true
          } > SHA256SUMS.txt.new
          mv SHA256SUMS.txt.new SHA256SUMS.txt
          echo "unlocker_hash=$(sha256sum unlocker.ps1 | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Patch $PayloadSha256 in install.ps1
        run: |
          NEW_HASH="${{ steps.hashes.outputs.unlocker_hash }}"
          # Extract version from VERSION file for the comment
          VERSION=$(cat VERSION)
          sed -i \
            "s|# unlocker.ps1 hash post-BOM-strip (.*)|# unlocker.ps1 hash post-BOM-strip (v${VERSION})|" \
            install.ps1
          sed -i \
            "s|\$Script:PayloadSha256 = '.*'|\$Script:PayloadSha256 = '${NEW_HASH}'|" \
            install.ps1

      - name: Commit updated hashes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add SHA256SUMS.txt install.ps1
          if git diff --staged --quiet; then
            echo "No hash changes — skipping commit."
          else
            VERSION=$(cat VERSION)
            git commit -m "chore(release): update SHA256SUMS and PayloadSha256 for v${VERSION}"
            git push origin main
          fi
