name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: PSScriptAnalyzer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: Install-Module PSScriptAnalyzer -Force -SkipPublisherCheck

      - name: Lint PowerShell scripts
        shell: pwsh
        run: |
          $results = @()
          Get-ChildItem -Filter '*.ps1' | ForEach-Object {
            $results += Invoke-ScriptAnalyzer -Path $_.FullName -Severity Error,Warning
          }
          if ($results) {
            $results | Format-Table -AutoSize
            exit 1
          }

  verify-hashes:
    name: Verify SHA256SUMS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check SHA256SUMS.txt is up to date
        run: |
          # Verify all .ps1 files listed in SHA256SUMS.txt match actual hashes
          failed=0
          while IFS='  ' read -r expected_hash filename; do
            # Skip EXE (not present in repo root; validated separately at release)
            [[ "$filename" == *.exe ]] && continue
            if [ ! -f "$filename" ]; then
              echo "MISSING: $filename"
              failed=1
              continue
            fi
            actual_hash=$(sha256sum "$filename" | cut -d' ' -f1)
            if [ "$actual_hash" != "$expected_hash" ]; then
              echo "MISMATCH: $filename"
              echo "  expected: $expected_hash"
              echo "  actual:   $actual_hash"
              failed=1
            else
              echo "OK: $filename"
            fi
          done < SHA256SUMS.txt
          exit $failed
