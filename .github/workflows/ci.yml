name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y mono-mcs binutils-mingw-w64-x86-64

      - name: Validate shell scripts
        run: bash -n build/build.sh

      - name: Validate PowerShell syntax
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          foreach ($file in @('install.ps1', 'unlocker.ps1')) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile((Resolve-Path $file), [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors.Count -gt 0) {
              $errors | Format-List | Out-String | Write-Error
              exit 1
            }
          }

      - name: Check version consistency
        run: |
          set -euo pipefail
          version="$(cat VERSION)"
          grep -Fq "Version: $version" install.ps1
          grep -Fq "Version: $version" unlocker.ps1
          grep -Fq '$Script:Version' install.ps1
          grep -Fq '$Script:Version' unlocker.ps1
          grep -Fq "AssemblyVersion" build/Launcher.cs
          grep -Fq "$version.0" build/Launcher.cs
          grep -Fq "version=\"$version.0\"" build/app.manifest

      - name: Check release asset contract
        run: |
          set -euo pipefail
          for asset in install.ps1 unlocker.ps1 MinecraftBedrockUnlocker.exe winmm.dll OnlineFix64.dll dlllist.txt OnlineFix.ini SHA256SUMS.txt; do
            grep -q "$asset" .github/workflows/release.yml
          done
          if grep -R "raw.githubusercontent.com/.*/main" install.ps1 unlocker.ps1; then
            exit 1
          fi
          if grep -R "mc_unlocker\.exe\|Download 2024\|3\.1\.[0-3]" README.md README_PT-BR.md INSTALL.md TROUBLESHOOTING.md docs/index.html install.ps1 unlocker.ps1 build; then
            exit 1
          fi

      - name: Build launcher
        run: ./build/build.sh

      - name: Verify release asset names
        run: |
          test -s dist/MinecraftBedrockUnlocker.exe
          test -s install.ps1
          test -s unlocker.ps1

  windows-powershell:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Windows PowerShell syntax
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          foreach ($file in @('install.ps1', 'unlocker.ps1')) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile((Resolve-Path $file), [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors.Count -gt 0) {
              $errors | Format-List | Out-String | Write-Error
              exit 1
            }
          }
